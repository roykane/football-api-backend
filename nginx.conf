# Upstream - PM2 cluster
upstream football_api {
    server 127.0.0.1:5000;
    keepalive 64;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_burst:10m rate=60r/s;

# Cache zone for static API responses
proxy_cache_path /var/cache/nginx/football-api levels=1:2 keys_zone=api_cache:10m max_size=100m inactive=10m;

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name api.martech.sbs;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.martech.sbs;

    # SSL (Cloudflare Origin hoac Let's Encrypt)
    ssl_certificate /etc/ssl/certs/api.martech.sbs.pem;
    ssl_certificate_key /etc/ssl/private/api.martech.sbs.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Logging
    access_log /var/log/nginx/api-football-access.log;
    error_log /var/log/nginx/api-football-error.log;

    # Gzip compression - giam bandwidth 60-80%
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        text/plain
        text/css
        text/xml;

    # Client limits
    client_max_body_size 10M;
    client_body_buffer_size 128k;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API endpoints
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://football_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
    }

    # Cache cho cac endpoint it thay doi (competitions, countries, bookmakers)
    location ~ ^/api/(competitions|countries|bookmakers) {
        limit_req zone=api_burst burst=100 nodelay;

        proxy_pass http://football_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';

        # Nginx cache 5 phut cho static data
        proxy_cache api_cache;
        proxy_cache_valid 200 5m;
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Health check - khong rate limit, khong log
    location /health {
        proxy_pass http://football_api/health;
        access_log off;
    }

    # WebSocket support (cho live chat, baccarat, etc.)
    location /socket.io/ {
        proxy_pass http://football_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }
}
